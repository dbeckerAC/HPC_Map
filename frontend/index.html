<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HPC Map</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <div id="app">
      <aside id="panel">
        <h1>HPC Distance Map</h1>
        <p>Distance to nearest eligible HPC</p>
        <div id="intro">
          <div class="intro-line">What this shows: motorway distance quality to HPC chargers.</div>
          <div class="intro-line">What you can do: pan/zoom, hover lines for distance, toggle charger layer.</div>
        </div>
        <div id="legend">
          <div class="legend-title">Distance Legend (km)</div>
          <div class="legend-bar"></div>
          <div class="legend-scale">
            <span>0 (near)</span>
            <span>20+ (far)</span>
          </div>
        </div>
        <label id="hpc-toggle-row">
          <input id="hpc-toggle" type="checkbox" />
          <span>Show charging stations</span>
        </label>
        <div id="hover">Hover a motorway segment</div>
      </aside>
      <div id="map"></div>
    </div>
  </body>
</html>
