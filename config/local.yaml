subset_bbox:
  min_lat: 47.2
  min_lon: 5.8
  max_lat: 55.1
  max_lon: 15.1

sampling_interval_m: 2000
directional_offset_m: 10
min_power_kw: 150

preselection:
  count: 8
  max_air_km: 75
  grid_cell_km: 25

color:
  min_km: 0
  max_km: 20
  clamp_above_max: true

overpass:
  endpoints:
    - "https://overpass-api.de/api/interpreter"
    - "https://overpass.kumi.systems/api/interpreter"
  timeout_seconds: 240
  retries_per_endpoint: 2
  retry_backoff_seconds: 3
  cache_max_age_days: 90
  refresh_confirmed: false

routing:
  distance_mode: "graphhopper"
  provider: "graphhopper"
  graphhopper_base_url: "http://127.0.0.1:8989"
  route_timeout_seconds: 8
  max_workers: 24
  progress_every_points: 250
  graphhopper_exact:
    enabled: true
    request_retries: 2
    request_backoff_seconds: 0.4
    max_candidates_per_point: 5000
    initial_candidate_batch: 16
    max_heading_deviation_deg: 95
    heading_penalty_relaxed: 60
    heading_penalty_strict: 300

paths:
  motorway_cache_geojson: "data/raw/osm/motorways.geojson"
  bnetza_csv: "data/raw/bnetza/Ladesaeulenregister_BNetzA_2026-03-25.csv"
  intermediate_dir: "data/intermediate"
  processed_dir: "data/processed"

tiles:
  distance_layer_name: "hpc_distance"
  distance_mbtiles_path: "data/processed/hpc_distance.mbtiles"
  hpc_layer_name: "hpc_sites"
  hpc_mbtiles_path: "data/processed/hpc_sites.mbtiles"
