min_power_kw: 150

analysis:
  default_power_threshold_kw: 150
  power_thresholds_kw: [150]

distance_core:
  graph_cache_path: "tools/graphhopper/graph-cache"
  segment_length_m: 250
  road_class: "MOTORWAY"
  objective: "distance"
  drop_unsnappable: true

paths:
  bnetza_csv: "data/raw/bnetza/Ladesaeulenregister_BNetzA_2026-03-25.csv"
  intermediate_dir: "data/intermediate"
  processed_dir: "data/processed"

tiles:
  distance_layer_prefix: "hpc_distance"
  distance_layer_name: "hpc_distance"
  distance_mbtiles_path: "data/processed/hpc_distance.mbtiles"
  hpc_layer_prefix: "hpc_sites"
